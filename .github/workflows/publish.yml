name: Publish to NPM

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'src/**'
  workflow_dispatch:

jobs:
  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Check if version already published
        id: check-version
        run: |
          PACKAGE_NAME="@countrystatecity/timezones"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version 2>/dev/null; then
            echo "published=true" >> $GITHUB_OUTPUT
            echo "Version $PACKAGE_VERSION already published"
          else
            echo "published=false" >> $GITHUB_OUTPUT
            echo "Version $PACKAGE_VERSION not yet published"
          fi

      - name: Publish to NPM
        if: steps.check-version.outputs.published == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.check-version.outputs.published == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check-version.outputs.version }}
          name: v${{ steps.check-version.outputs.version }}
          body: |
            ## @countrystatecity/timezones v${{ steps.check-version.outputs.version }}

            Published to NPM: https://www.npmjs.com/package/@countrystatecity/timezones

            ### Installation
            ```bash
            npm install @countrystatecity/timezones
            ```

            See the [README](https://github.com/dr5hn/countrystatecity-timezones/blob/main/README.md) for usage instructions.
          draft: false
          prerelease: false
